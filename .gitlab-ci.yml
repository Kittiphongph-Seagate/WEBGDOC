stages:
  - build-check
  - auto-tag

# ========================================================
# เสาที่ 1: ตรวจสอบคุณภาพโค้ดและการสร้างบิลด์ (CI Verification)
# ========================================================
verify_build:
  stage: build-check
  image: node:20-alpine
  script:
    - cd gitlab-tutorial
    - npm ci
    - npm run build
  cache:
    key:
      files:
        - gitlab-tutorial/package-lock.json
    paths:
      - gitlab-tutorial/node_modules/
  rules:
    - if: $CI_COMMIT_BRANCH

# ========================================================
# เสาที่ 3: ระบบจัดเก็บบันทึกประวัติถาวร (Release & Tags)
# ========================================================
job_create_tag_and_release:
  stage: auto-tag
  image: alpine:latest
  before_script:
    - apk add --no-cache curl tzdata zip
    - cp /usr/share/zoneinfo/Asia/Bangkok /etc/localtime
    - echo "Asia/Bangkok" > /etc/timezone
  script:
    # 1. จัดทำรูปแบบชื่อ Tag: [YYYYMMDD]-[BranchName]-[PipelineRunNumber]
    - CURRENT_DATE=$(date +'%Y%m%d')
    - TAG_NAME="${CURRENT_DATE}-${CI_COMMIT_REF_SLUG}-${CI_PIPELINE_IID}"
    - echo "กำลังเตรียมสร้าง Tag และ Release ใหม่ => ${TAG_NAME}"
    
    # 2. บีบอัดโค้ดเป็นไฟล์ ZIP (ยกเว้น .git และ node_modules)
    - zip -r "release-${TAG_NAME}.zip" . -x "*.git*" "*node_modules*"
    
    # 3. ส่งคำสั่งสร้าง Git Tag ไปยัง GitLab API (ใส่ -k เพื่อข้ามการตรวจ SSL ในเครือข่ายภายใน)
    - |
      curl -k --request POST \
        --header "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" \
        --data "tag_name=${TAG_NAME}" \
        --data "ref=${CI_COMMIT_SHA}" \
        --data "message=สร้างป้ายกำกับอัตโนมัติจาก GitLab CI Pipeline ครั้งที่ #${CI_PIPELINE_IID}" \
        "https://${CI_SERVER_HOST}/api/v4/projects/${CI_PROJECT_ID}/repository/tags"
        
    # 4. ส่งคำสั่งสร้าง GitLab Release (ประวัติถาวร) ผูกติดกับ Tag ดังกล่าว
    - |
      curl -k --request POST \
        --header "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" \
        --data "name=Release ${TAG_NAME}" \
        --data "tag_name=${TAG_NAME}" \
        --data "description=สร้างประวัติเวอร์ชันอย่างเป็นทางการแบบถาวรจาก GitLab CI/CD Pipeline #${CI_PIPELINE_IID}" \
        "https://${CI_SERVER_HOST}/api/v4/projects/${CI_PROJECT_ID}/releases"
  artifacts:
    name: "release-${TAG_NAME}"
    paths:
      - "release-*.zip"
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH